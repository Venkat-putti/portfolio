<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Me</title>

    <style>
        body {
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            background: #f9fafb;
            color: #111827;
        }

        /* NAVBAR */
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 40px;
            background: #0f172a;
            color: #e5e7eb;
            position: relative;
        }

        .logo {
            font-size: 20px;
            font-weight: 600;
        }

        .nav-links {
            list-style: none;
            display: flex;
        }

        .nav-links li {
            margin-left: 25px;
        }

        .nav-links a {
            color: #cbd5f5;
            text-decoration: none;
            font-size: 14px;
        }

        .nav-links a:hover {
            color: white;
        }

        /* HAMBURGER */
        .menu-toggle {
            display: none;
            flex-direction: column;
            cursor: pointer;
        }

        .menu-toggle span {
            height: 3px;
            width: 25px;
            background: white;
            margin: 4px 0;
            display: block;
        }

        /* CONTAINER */
        .container {
            max-width: 800px;
            margin: auto;
            padding: 60px 20px;
            text-align: center;
        }

        h1 {
            font-size: 36px;
        }

        p.subtitle {
            color: #6b7280;
            margin-bottom: 40px;
        }

        .contact-info {
            background: white;
            padding: 25px;
            border-radius: 10px;
            border: 1px solid #e5e7eb;
            margin-bottom: 30px;
        }

        .contact-info p {
            margin: 10px 0;
            color: #374151;
        }

        .highlight {
            color: #2563eb;
        }

        form {
            background: white;
            padding: 25px;
            border-radius: 10px;
            border: 1px solid #e5e7eb;
        }

        input, textarea {
            width: 100%;
            padding: 10px;
            margin-bottom: 15px;
            border: 1px solid #d1d5db;
            border-radius: 5px;
        }

        button {
            padding: 10px 20px;
            background: #2563eb;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        /* MOBILE */
        @media (max-width: 768px) {

            .menu-toggle {
                display: flex;
            }

            .nav-links {
                position: absolute;
                top: 70px;
                left: 0;
                width: 100%;
                background: #0f172a;
                flex-direction: column;
                align-items: center;
                display: none;
            }

            .nav-links.active {
                display: flex;
            }

            .nav-links li {
                margin: 15px 0;
            }
        }

    </style>
</head>
<body>

<header>
    <nav class="navbar">
        <h1 class="logo">MyPortfolio</h1>

        <!-- Hamburger -->
        <div class="menu-toggle" id="menu-toggle">
            <span></span>
            <span></span>
            <span></span>
        </div>

        <ul class="nav-links" id="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="about.html">About</a></li>
            <li><a href="skills.html">Skills</a></li>
            <li><a href="projects.html">Projects</a></li>
            <li><a href="contact.html">Contact</a></li>
        </ul>
    </nav>
</header>

<div class="container">
    <h1>Contact Me</h1>
    <p class="subtitle">Feel free to reach out for opportunities or queries.</p>

    <div class="contact-info">
        <p><span class="highlight">Name:</span> Putti Venkata Sai Manikanta</p>
        <p><span class="highlight">Email:</span> puttivenkat143@gmail.com</p>
        <p><span class="highlight">Phone:</span> +91 9542982882</p>
    </div>

    <form>
        <input type="text" placeholder="Your Name" required>
        <input type="email" placeholder="Your Email" required>
        <textarea placeholder="Your Message" required></textarea>
        <button type="submit">Send Message</button>
    </form>
</div>

<script>
    const toggle = document.getElementById('menu-toggle');
    const nav = document.getElementById('nav-links');

    toggle.addEventListener('click', () => {
        nav.classList.toggle('active');
    });
</script>

</body>
</html>
