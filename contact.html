<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Me</title>

    <style>
        body {
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            background: #f9fafb;
            color: #111827;
        }

        /* NAVBAR */
        .navbar {
            display: flex;
            justify-content: space-between;
            padding: 20px 40px;
            background: #0f172a;
            color: #e5e7eb;
        }

        .logo {
            font-size: 20px;
            font-weight: 600;
        }

        .nav-links {
            list-style: none;
            display: flex;
        }

        .nav-links li {
            margin-left: 25px;
        }

        .nav-links a {
            color: #cbd5f5;
            text-decoration: none;
            font-size: 14px;
        }

        .nav-links a:hover {
            color: white;
        }

        /* CONTAINER */
        .container {
            max-width: 800px;
            margin: auto;
            padding: 60px 20px;
            text-align: center;
        }

        h1 {
            font-size: 36px;
            margin-bottom: 10px;
        }

        p.subtitle {
            color: #6b7280;
            margin-bottom: 40px;
        }

        /* CONTACT INFO */
        .contact-info {
            background: white;
            padding: 25px;
            border-radius: 10px;
            border: 1px solid #e5e7eb;
            margin-bottom: 30px;
        }

        .contact-info p {
            margin: 10px 0;
            color: #374151;
        }

        .highlight {
            color: #2563eb;
            font-weight: 500;
        }

        /* FORM */
        form {
            background: white;
            padding: 25px;
            border-radius: 10px;
            border: 1px solid #e5e7eb;
        }

        input, textarea {
            width: 100%;
            padding: 10px;
            margin-bottom: 15px;
            border: 1px solid #d1d5db;
            border-radius: 5px;
            font-size: 14px;
        }

        textarea {
            resize: none;
            height: 120px;
        }

        button {
            padding: 10px 20px;
            background: #2563eb;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background: #1e40af;
        }

    </style>
</head>
<body>

    <!-- Navbar -->
    <header>
        <nav class="navbar">
            <h1 class="logo">MyPortfolio</h1>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About</a></li>
                <li><a href="skills.html">Skills</a></li>
                <li><a href="projects.html">Projects</a></li>
                <li><a href="contact.html">Contact</a></li>
            </ul>
        </nav>
    </header>

    <!-- Content -->
    <div class="container">
        <h1>Contact Me</h1>
        <p class="subtitle">
            Feel free to reach out for opportunities, collaborations, or any queries.
        </p>

        <!-- Contact Info -->
        <div class="contact-info">
            <p><span class="highlight">Name:</span> Putti Venkata Sai Manikanta</p>
            <p><span class="highlight">Email:</span> puttivenkat143@gmail.com</p>
            <p><span class="highlight">Phone:</span> +91 9542982882</p>
        </div>

        <!-- Contact Form -->
        <form>
            <input type="text" placeholder="Your Name" required>
            <input type="email" placeholder="Your Email" required>
            <textarea placeholder="Your Message" required></textarea>
            <button type="submit">Send Message</button>
        </form>
    </div>

</body>
</html>
